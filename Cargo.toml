[package]
name = "realistic"
description = "Towards an API for the Real Numbers"
license = "Apache-2.0"
repository = "https://github.com/tialaramex/realistic/"
version = "0.8.1"
edition = "2024"

[dependencies]
ciborium = "0.2.2"
num = { version = "0.4.3", features = ["num-bigint", "serde"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
